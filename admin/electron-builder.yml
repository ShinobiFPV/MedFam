appId: com.shinobifpv.medfam-admin
productName: MedFam Admin
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: ${productName}-Setup-${version}.${ext}
publish:
  provider: github
  owner: ShinobiFPV
  repo: MedFam
