appId: com.shinobifpv.medfam-admin
productName: MedFam Admin
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  # No spaces: GitHub silently mangles spaces in uploaded release asset names
  # (differently than electron-builder's own latest.yml expects), which
  # breaks electron-updater's ability to find the file. productName itself
  # (used for the window title / Start Menu entry / install dir) can still
  # have a space; only the actual output filename needs to avoid one.
  artifactName: MedFam-Admin-Setup-${version}.${ext}
publish:
  provider: github
  owner: ShinobiFPV
  repo: MedFam
